# CatSeedLogin 统一配置文件
# Version: 2.0.0

# 语言设置 (使用下划线格式，如 zh_CN, en_US)
# 对应的语言文件存放在 languages/ 文件夹中
# 文件名使用标准格式，如 zh-CN.yml, en-US.yml
language: "zh_CN"

# 核心设置
settings:
  # 相同IP注册数量限制
  ip-register-count-limit: 2
  # 相同IP登录数量限制
  ip-count-limit: 2
  # 是否限制中文ID
  limit-chinese-id: true
  # 游戏ID最小长度
  min-length-id: 2
  # 游戏ID最大长度
  max-length-id: 15
  # 登录前不受到伤害
  before-login-no-damage: true
  # 离开服务器重新进入的间隔限制 (单位: tick, 20tick = 1秒)
  reenter-interval: 60
  # 登录后是否返回退出地点
  after-login-back: true
  # 登录前是否强制在登录地点
  can-tp-spawn-location: true
  # 自动踢出未登录的玩家 (秒数, 小于1则关闭)
  auto-kick: 120
  # 死亡状态退出游戏是否记录退出位置
  death-state-quit-record-location: true
  # 游戏名正则表达式
  name-pattern: "^\\w+$"
  # 登录前允许执行的指令 (支持正则表达式)
  command-white-list:
    - "/(?i)l(ogin)?(\\z| .*)"
    - "/(?i)reg(ister)?(\\z| .*)"
    - "/(?i)resetpassword?(\\z| .*)"
    - "/(?i)repw?(\\z| .*)"
    - "/(?i)worldedit cui"

# 基岩版设置
bedrock:
  # 基岩版登录绕过
  login-bypass: true
  # Floodgate前缀保护
  floodgate-prefix-protect: true

# 同IP免登录设置
same-ip-login:
  # 是否启用同IP免登录
  enabled: false
  # IP超时时间 (分钟)
  timeout: 5

# 登录前隐藏背包 (需要ProtocolLib)
empty-backpack: true

# 登录点设置
spawn:
  # 格式: 世界名:x:y:z:yaw:pitch
  # 留空则自动使用服务器默认世界的出生点
  location: ""

# 数据库设置
database:
  # 使用MySQL (false = 使用SQLite)
  mysql: false
  host: "127.0.0.1"
  port: 3306
  database: "catseedlogin"
  user: "root"
  password: "password"

# 邮箱验证设置
email:
  # 是否启用邮箱功能
  enabled: false
  account: ""
  password: ""
  smtp-host: "smtp.example.com"
  smtp-port: "465"
  ssl-auth: true
  from-name: "Server"

# BungeeCord/Velocity 代理设置
proxy:
  # 是否启用代理模式
  enabled: false
  # 通讯IP (建议使用内网)
  host: "127.0.0.1"
  # 通讯端口
  port: 2333
  # 验证密钥
  auth-key: ""
  # 登录服务器名称 (仅代理端需要)
  login-server-name: "lobby"